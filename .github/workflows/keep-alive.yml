name: Keep Render awake

on:
  schedule:
    # every 10 minutes (GitHub may delay a few minutes under load; still well
    # inside Render's 15-minute spin-down window most of the time)
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: |
          curl -sS -o /dev/null -w "status %{http_code}, %{time_total}s\n" \
            --max-time 90 --retry 2 \
            https://lotto-app-m0fe.onrender.com/
